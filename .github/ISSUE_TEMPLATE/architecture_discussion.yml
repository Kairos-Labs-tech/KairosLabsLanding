name: Architecture Discussion
description: Propose a structural change
title: "[Arch]: "
labels: ["type: architecture"]
body:
  - type: textarea
    id: current
    attributes:
      label: Current State
      description: How does it work today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What is the new design?
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: What do we gain? What do we lose?
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: What could go wrong?
    validations:
      required: true
