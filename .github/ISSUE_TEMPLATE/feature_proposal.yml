name: Feature Proposal
description: Suggest an idea
title: "[Feature]: "
labels: ["type: feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this important to build now?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What else have you considered?
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Success Criteria
      description: How will we know if this succeeds?
    validations:
      required: true
